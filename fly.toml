# Fly.io configuration — alternative à Render.
# Doc : https://fly.io/docs/reference/configuration/
#
# Déploiement initial :
#   1. brew install flyctl  (ou curl -L https://fly.io/install.sh | sh)
#   2. fly auth signup  (ou fly auth login)
#   3. cd investment_app
#   4. fly launch --copy-config --no-deploy
#   5. fly volumes create investment_data --size 1 --region cdg
#   6. fly secrets set APP_ENCRYPTION_KEY=...  JWT_SECRET=...  ALPHA_VANTAGE_KEY=...  OPEN_EXCHANGE_RATES_KEY=...  FRED_KEY=...
#   7. fly deploy

app = "investment-app"
primary_region = "cdg"  # Paris — change selon ta zone

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  DATABASE_URL = "sqlite:////data/app.db"

[[mounts]]
  source = "investment_data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0   # passe à 1 pour éviter le cold start
  processes = ["app"]

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/health"

# Single VM par design : le scheduler APScheduler + l'état SSE sont en mémoire.
[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1
