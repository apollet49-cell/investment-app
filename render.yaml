# Render.com Blueprint — déploie l'app en un clic via le repo GitHub.
# Doc : https://render.com/docs/blueprint-spec
#
# Architecture :
#   - 1 web service (Docker)        : free tier (s'endort après 15 min d'inactivité)
#   - 1 Postgres                     : free tier (90 jours puis recréation manuelle)
#
# Le free tier de Render ne permet plus de disque persistant, donc on remplace
# SQLite par Postgres pour que les données survivent aux redéploiements.

databases:
  - name: investment-db
    databaseName: investment_app
    user: investment_app
    plan: free
    region: frankfurt

services:
  - type: web
    name: investment-app
    runtime: docker
    plan: free
    region: frankfurt          # même région que la DB pour réduire la latence
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      # URL Postgres injectée automatiquement depuis le service base de données.
      - key: DATABASE_URL
        fromDatabase:
          name: investment-db
          property: connectionString
      # JWT secret — Render génère une valeur aléatoire sécurisée la première fois
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_DAYS
        value: "7"
      # APP_ENCRYPTION_KEY doit être une clé Fernet valide (base64, 32 bytes).
      # Génère-la localement avec :
      #   python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      # Puis colle la valeur dans le dashboard Render → Environment.
      - key: APP_ENCRYPTION_KEY
        sync: false
      # Clés API tierces (voir README pour les liens d'inscription gratuite).
      - key: ALPHA_VANTAGE_KEY
        sync: false
      - key: OPEN_EXCHANGE_RATES_KEY
        sync: false
      - key: FRED_KEY
        sync: false
      # Optionnel : clé Anthropic globale (les utilisateurs peuvent aussi mettre la leur dans Settings).
      - key: ANTHROPIC_API_KEY
        sync: false
